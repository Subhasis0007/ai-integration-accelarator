name: AI Issue Triage

on:
  issues:
    types: [opened]

jobs:
  classify-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Call Hugging Face Sentiment API
        id: sentiment
        shell: bash
        run: |
          TITLE='${{ github.event.issue.title }}'

          PAYLOAD=$(python3 - <<'PY'
import json, os
title = os.environ["TITLE"]
print(json.dumps({
    "inputs": title,
    "options": {"wait_for_model": True}
}))
PY
)
          export TITLE

          RESPONSE=$(curl -s \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api-inference.huggingface.co/models/distilbert-base-uncased-finetuned-sst-2-english")

          echo "Raw response: $RESPONSE"

          PARSED=$(echo "$RESPONSE" | python3 - <<'PY'
import sys, json

raw = sys.stdin.read().strip()

try:
    data = json.loads(raw)
except json.JSONDecodeError:
    print("status=error")
    print("message=Invalid JSON response from Hugging Face")
    sys.exit(0)

# Handle API error response
if isinstance(data, dict):
    msg = data.get("error", "Unexpected object response from Hugging Face API")
    print("status=error")
    print(f"message={msg}")
    sys.exit(0)

# Handle expected list response
try:
    # HF often returns: [[{label, score}, {label, score}]]
    candidates = data[0] if isinstance(data[0], list) else data
    top = max(candidates, key=lambda x: x["score"])
    print("status=success")
    print(f"label={top['label']}")
    print(f"score={round(top['score'] * 100, 1)}")
except Exception as e:
    print("status=error")
    print(f"message=Parsing failed: {str(e)}")
PY
)

          echo "$PARSED"

          STATUS=$(echo "$PARSED" | grep '^status=' | cut -d= -f2-)
          echo "status=$STATUS" >> $GITHUB_OUTPUT

          if [ "$STATUS" = "success" ]; then
            LABEL=$(echo "$PARSED" | grep '^label=' | cut -d= -f2-)
            SCORE=$(echo "$PARSED" | grep '^score=' | cut -d= -f2-)
            echo "label=$LABEL" >> $GITHUB_OUTPUT
            echo "score=$SCORE" >> $GITHUB_OUTPUT
          else
            MESSAGE=$(echo "$PARSED" | grep '^message=' | cut -d= -f2-)
            echo "message=$MESSAGE" >> $GITHUB_OUTPUT
          fi

      - name: Post AI triage comment
        uses: actions/github-script@v7
        with:
          script: |
            const status = "${{ steps.sentiment.outputs.status }}";

            let body = "";

            if (status === "success") {
              const label = "${{ steps.sentiment.outputs.label }}";
              const score = "${{ steps.sentiment.outputs.score }}";
              const emoji = label === "POSITIVE" ? "🟢" : "🔴";

              body = `## 🤖 AI Triage Result

${emoji} **Sentiment:** ${label}
📊 **Confidence:** ${score}%

*This was auto-classified by an AI integration pipeline (Hugging Face DistilBERT + GitHub Actions). In an enterprise setup, this would route to Dynamics 365, Service Bus, or trigger a Logic Apps workflow.*`;
            } else {
              const message = "${{ steps.sentiment.outputs.message }}";

              body = `## 🤖 AI Triage Result

⚠️ The sentiment classification could not be completed.

**Reason:** ${message}

*This issue was still detected by the workflow, but the AI model response could not be parsed successfully.*`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });