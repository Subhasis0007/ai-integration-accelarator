name: AI Issue Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  classify-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Call Hugging Face Sentiment API
        id: sentiment
        shell: bash
        env:
          TITLE: ${{ github.event.issue.title }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail

          echo "Processing issue title: $TITLE"

          if [ -z "${HF_TOKEN:-}" ]; then
            echo "status=error" >> "$GITHUB_OUTPUT"
            echo "message=HF_TOKEN secret is not configured" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            '{inputs: $title, options: {wait_for_model: true}}')

          RESPONSE=$(curl -sS \
            -X POST \
            -H "Authorization: Bearer $HF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api-inference.huggingface.co/models/distilbert-base-uncased-finetuned-sst-2-english")

          echo "Raw response: $RESPONSE"

          if ! echo "$RESPONSE" | jq -e . >/dev/null 2>&1; then
            echo "status=error" >> "$GITHUB_OUTPUT"
            echo "message=Invalid JSON response from Hugging Face API" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RESPONSE_TYPE=$(echo "$RESPONSE" | jq -r 'type')

          if [ "$RESPONSE_TYPE" = "object" ]; then
            MESSAGE=$(echo "$RESPONSE" | jq -r '.error // .message // "Unexpected object response from Hugging Face API"')
            echo "status=error" >> "$GITHUB_OUTPUT"
            echo "message=$MESSAGE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LABEL=$(echo "$RESPONSE" | jq -r '
            try (
              if (.[0] | type) == "array" then
                .[0] | max_by(.score) | .label
              else
                . | max_by(.score) | .label
              end
            ) catch "PARSE_ERROR"
          ')

          RAW_SCORE=$(echo "$RESPONSE" | jq -r '
            try (
              if (.[0] | type) == "array" then
                .[0] | max_by(.score) | .score
              else
                . | max_by(.score) | .score
              end
            ) catch "PARSE_ERROR"
          ')

          if [ "$LABEL" = "PARSE_ERROR" ] || [ "$RAW_SCORE" = "PARSE_ERROR" ] || [ -z "$LABEL" ] || [ -z "$RAW_SCORE" ]; then
            echo "status=error" >> "$GITHUB_OUTPUT"
            echo "message=Parsing failed: unexpected response structure" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SCORE=$(awk "BEGIN { printf \"%.1f\", $RAW_SCORE * 100 }")

          echo "status=success" >> "$GITHUB_OUTPUT"
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"

      - name: Post AI triage comment
        uses: actions/github-script@v7
        with:
          script: |
            const status = `${{ steps.sentiment.outputs.status }}`;
            let body = "";

            if (status === "success") {
              const label = `${{ steps.sentiment.outputs.label }}`;
              const score = `${{ steps.sentiment.outputs.score }}`;
              const emoji = label === "POSITIVE" ? "🟢" : "🔴";

              body = `## 🤖 AI Triage Result

${emoji} **Sentiment:** ${label}
📊 **Confidence:** ${score}%

*This was auto-classified by an AI integration pipeline (Hugging Face DistilBERT + GitHub Actions). In an enterprise setup, this could route to Dynamics 365, Service Bus, or trigger a Logic Apps workflow.*`;
            } else {
              const message = `${{ steps.sentiment.outputs.message }}`;

              body = `## 🤖 AI Triage Result

⚠️ The sentiment classification could not be completed.

**Reason:** ${message}

*This issue was still detected by the workflow, but the AI model response could not be parsed successfully.*`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });